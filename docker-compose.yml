services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: integration-hub:local
    container_name: integration-hub
    restart: unless-stopped
    ports:
      - "8000:8080"
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    container_name: integration-hub-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-integration_hub}
      MYSQL_USER: ${DB_USERNAME:-integration_hub}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    ports:
      - "3306:3306"
    volumes:
      - integration_hub_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  integration_hub_mysql:
